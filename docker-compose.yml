services:
  backend:
    build: ./backend
    expose:
      - "8000"
    volumes:
      - ./backend:/app
      - backend-static:/app/static
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    expose:
      - "3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  backend-static:
